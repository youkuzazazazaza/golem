syntax = "proto3";

package group.api;

option go_package = "github.com/sbgayhub/golem/host/api/group;groupapi";


// ==================== 通用响应 ====================

// OperateResponse 通用操作响应（字段编号与 SDK proto 对齐）
message OperateResponse {
  int32 code = 1;     // 状态码（0=成功）
  string message = 2; // 提示信息
}

// ==================== 群成员信息 ====================

// Member 群成员（镜像协议层 Member）
message Member {
  string username = 1;           // 用户名
  uint32 status = 2;             // 状态
  string nickname = 3;           // 昵称
  string nickname_jianpin = 4;   // 昵称简拼
  string nickname_quanpin = 5;   // 昵称全拼
  uint32 gender = 6;             // 性别
  string remark = 9;             // 备注
  string remark_jianpin = 10;    // 备注简拼
  string remark_quanpin = 11;    // 备注全拼
  uint32 contact_type = 12;      // 联系人类型
  string province = 13;          // 省份
  string city = 14;              // 城市
  string signature = 15;         // 个性签名
  uint32 personal_card = 16;     // 个人名片标志
  uint32 verify_flag = 17;       // 验证标志
  string verify_info = 18;       // 验证信息
  string country = 19;           // 国家
}

// MemberInfo 群成员详情（镜像协议层 GetGroupMemberDetailResponse.Result.MemberInfo，字段编号与 SDK proto 对齐）
message MemberInfo {
  string username = 1;       // 用户名
  string nickname = 2;       // 昵称
  string display_name = 3;   // 群内显示名
  string big_avatar_url = 4; // 大头像 URL
  string small_avatar_url = 5; // 小头像 URL
  uint32 flag = 6;           // 成员标志
  string inviter_username = 7; // 邀请人用户名
}

// FacingMember 面对面建群成员（字段编号与 SDK proto 对齐）
message FacingMember {
  string username = 1;     // 用户名
  string nickname = 2;     // 昵称
  string display_name = 3; // 显示名
  string avatar_url = 4;   // 头像 URL
  uint32 flag = 5;         // 标志
}

// ==================== 群聊创建 ====================

// CreateGroupRequest 创建群聊请求
message CreateGroupRequest {
  repeated string members = 1; // 初始成员用户名列表
}

// CreateGroupResponse 创建群聊响应（字段编号与 SDK proto 对齐）
message CreateGroupResponse {
  string topic = 1;               // 群名称
  string topic_jianpin = 2;       // 群名简拼
  string topic_quanpin = 3;       // 群名全拼
  uint32 member_count = 4;        // 成员数量
  repeated Member member_list = 5; // 成员列表
  string group = 6;               // 群 ID
  bytes avatar_buffer = 7;        // 头像数据
  string big_avatar_url = 8;      // 大头像 URL
  string small_avatar_url = 9;    // 小头像 URL
}

// FacingCreateGroupRequest 面对面建群请求
message FacingCreateGroupRequest {
  string password = 1;       // 面对面密码
  float latitude = 2;        // 纬度
  float longitude = 3;       // 经度
  uint32 operate = 4;        // 操作类型
}

// FacingCreateGroupResponse 面对面建群响应（字段编号与 SDK proto 对齐）
message FacingCreateGroupResponse {
  string ticket = 2;                 // 票据
  uint32 member_count = 3;           // 成员数量
  repeated FacingMember member_list = 4; // 成员列表
  string group = 5;                  // 群 ID
}

// ==================== 群信息获取 ====================

// GetGroupInfoRequest 获取群信息请求
message GetGroupInfoRequest {
  string group_id = 1; // 群 ID
}

// GetGroupInfoDetailResponse 获取群详细信息响应（字段编号与 SDK proto 对齐）
message GetGroupInfoDetailResponse {
  string announcement = 1;           // 群公告
  int32 info_version = 2;            // 信息版本号
  string announcement_editor = 3;    // 公告编辑者
  int32 announcement_publish_time = 4; // 公告发布时间
  int32 status = 5;                  // 群状态
  int32 business_type = 6;           // 业务类型
}

// GetGroupMemberDetailRequest 获取群成员详情请求
message GetGroupMemberDetailRequest {
  string group_id = 1; // 群 ID
}

// GetGroupMemberDetailResponse 获取群成员详情响应（字段编号与 SDK proto 对齐）
message GetGroupMemberDetailResponse {
  string group_id = 1;              // 群 ID
  int32 server_version = 2;         // 服务端版本号
  uint32 count = 3;                 // 成员数量
  repeated MemberInfo members = 4;  // 成员列表
}

// GetGroupQRCodeRequest 获取群二维码请求
message GetGroupQRCodeRequest {
  string group_id = 1; // 群 ID
}

// GetGroupQRCodeResponse 获取群二维码响应（字段编号与 SDK proto 对齐）
message GetGroupQRCodeResponse {
  bytes qrcode = 1;        // 二维码图片数据
  string footer_wording = 2; // 底部文字
  uint32 revoke_qrcode = 3; // 撤销二维码标志
  string notify_wording = 4; // 通知文字
  string qrcode_url = 5;    // 二维码 URL
}

// ==================== 群成员管理 ====================

// AddGroupMemberRequest 添加群成员请求
message AddGroupMemberRequest {
  string group_id = 1;       // 群 ID
  repeated string members = 2; // 成员用户名列表
}

// AddGroupMemberResponse 添加群成员响应（字段编号与 SDK proto 对齐）
message AddGroupMemberResponse {
  uint32 member_count = 1;         // 成员数量
  repeated Member member_list = 2; // 新增成员列表
}

// InviteGroupMemberRequest 邀请群成员请求
message InviteGroupMemberRequest {
  string group_id = 1;       // 群 ID
  repeated string members = 2; // 成员用户名列表
}

// InviteGroupMemberResponse 邀请群成员响应（字段编号与 SDK proto 对齐）
message InviteGroupMemberResponse {
  uint32 member_count = 1;         // 成员数量
  repeated Member member_list = 2; // 新增成员列表
}

// RemoveGroupMemberRequest 移除群成员请求
message RemoveGroupMemberRequest {
  string group_id = 1;       // 群 ID
  repeated string members = 2; // 要移除的成员列表
}

// RemoveGroupMemberResponse 移除群成员响应（字段编号与 SDK proto 对齐）
message RemoveGroupMemberResponse {
  uint32 member_count = 1;         // 剩余成员数量
  repeated Member member_list = 2; // 移除的成员列表
}

// ==================== 群设置 ====================

// SetGroupNameRequest 设置群名称请求
message SetGroupNameRequest {
  string group_id = 1; // 群 ID
  string name = 2;     // 新群名称
}

// SetAnnouncementRequest 设置群公告请求
message SetAnnouncementRequest {
  string group_id = 1; // 群 ID
  string content = 2;  // 公告内容
}

// SetAnnouncementResponse 设置群公告响应（字段编号与 SDK proto 对齐）
message SetAnnouncementResponse {
  int32 code = 1;     // 状态码
  string message = 2; // 提示信息
}

// SetGroupRemarkRequest 设置群备注请求
message SetGroupRemarkRequest {
  string group_id = 1; // 群 ID
  string remark = 2;   // 群备注
}

// SetContactListRequest 保存到通讯录请求
message SetContactListRequest {
  string group_id = 1; // 群 ID
  bool save = 2;       // true=保存，false=取消保存
}

// ==================== 群管理员 ====================

// SetGroupAdminRequest 设置群管理员请求
message SetGroupAdminRequest {
  string group_id = 1;       // 群 ID
  repeated string members = 2; // 管理员列表
}

// RemoveGroupAdminRequest 移除群管理员请求
message RemoveGroupAdminRequest {
  string group_id = 1;       // 群 ID
  repeated string members = 2; // 要移除的管理员列表
}

// TransferGroupOwnerRequest 转让群主请求
message TransferGroupOwnerRequest {
  string group_id = 1;   // 群 ID
  string new_owner = 2;  // 新群主用户名
}

// ==================== 进群与退群 ====================

// ScanJoinRequest 扫码进群请求
message ScanJoinRequest {
  string qrcode_url = 1; // 二维码 URL
}

// JoinResult 进群结果（字段编号与 SDK proto 对齐）
message JoinResult {
  string group_id = 1; // 群 ID
  string message = 2;  // 消息
}

// ConsentJoinRequest 同意入群请求
message ConsentJoinRequest {
  string invite_url = 1; // 邀请链接
}

// QuitGroupRequest 退出群聊请求
message QuitGroupRequest {
  string group_id = 1; // 群 ID
}
