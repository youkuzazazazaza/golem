syntax = "proto3";

package api.label;

option go_package = "github.com/sbgayhub/golem/host/api/label;labelapi";


// ==================== 通用响应 ====================

// OperateResponse 通用操作响应
message OperateResponse {
  int32 code = 1;
  string message = 2;
}

// ==================== 数据类型 ====================

// Pair 标签对（镜像 golem label.Pair，字段编号完全一致）
message Pair {
  optional string name = 1;
  optional uint32 id = 2;
}

// ==================== 获取标签列表 ====================

// ListLabelsResponse 获取标签列表响应（镜像 golem GetContactListResponse，字段号从 2 开始）
message ListLabelsResponse {
  optional uint32 count = 2;  // 对应 golem field 2
  repeated Pair list = 3;     // 对应 golem field 3
}

// ==================== 添加标签 ====================

// AddLabelResponse 添加标签响应（镜像 golem AddContactResponse，字段号从 2 开始）
message AddLabelResponse {
  optional uint32 count = 2;  // 对应 golem field 2
  optional Pair list = 3;     // 对应 golem field 3
}

