syntax = "proto3";

package message.api;

option go_package = "github.com/sbgayhub/golem/host/api/message;messageapi";

import "api/base/base.proto";
import "google/protobuf/wrappers.proto";

// ==================== 同步消息 ====================

// SyncMessageRequest 同步消息请求
message SyncMessageRequest {
  uint32 selector = 1; // 同步选择器
}

// ==================== 通用响应 ====================

// OperateResponse 通用操作响应
message OperateResponse {
  int32 code = 1;     // 状态码（0=成功）
  string message = 2; // 提示信息
}

// ==================== 发送文本消息 ====================

// SendMessageResponse 发送消息响应（镜像 golem.message.SendMessageResponse）
message SendMessageResponse {
  optional .api.base.BaseResponse base_response = 1; // 基础响应
  optional int32 count = 2;                         // 数量
  repeated Result list = 3;                         // 响应列表
  optional int32 unknown = 4;                       // 未知字段

  message Result {
    optional int64 code = 1;                         // 返回码
    optional google.protobuf.StringValue receiver = 2; // 接收者用户名
    optional uint64 id = 3;                          // 消息 ID
    optional uint64 client_id = 4;                   // 客户端消息 ID
    optional uint32 create_time = 5;                 // 创建时间
    optional uint32 server_time = 6;                 // 服务器时间
    optional uint32 type = 7;                        // 类型
    optional uint64 new_id = 8;                      // 新消息 ID
  }
}

// ==================== 发送媒体消息 ====================

// UploadImageResponse 上传图片响应（镜像 golem.message.UploadImageResponse）
message UploadImageResponse {
  optional .api.base.BaseResponse base_response = 1; // 基础响应
  optional uint32 id = 2;                            // 消息 ID
  optional google.protobuf.StringValue client_id = 3; // 客户端图片 ID
  optional google.protobuf.StringValue sender = 4;    // 发送者用户名
  optional google.protobuf.StringValue receiver = 5;  // 接收者用户名
  optional uint32 size = 6;                          // 总长度
  optional uint32 offset = 7;                        // 起始位置
  optional uint32 chunk_size = 8;                    // 数据长度
  optional uint32 create_time = 9;                   // 创建时间
  optional uint64 new_id = 10;                       // 新消息 ID
  optional string aes_key = 11;                      // AES 密钥
  optional string file_id = 12;                      // 文件 ID
  optional string extend_xml = 13;                   // 扩展 XML
}

// UploadVideoResponse 上传视频响应（镜像 golem.message.UploadVideoResponse）
message UploadVideoResponse {
  optional .api.base.BaseResponse base_response = 1; // 基础响应
  optional string client_id = 2;                    // 客户端消息 ID
  optional int64 id = 3;                            // 消息 ID
  optional int64 thumb_offset = 4;                  // 缩略图偏移量
  optional int64 video_offset = 5;                  // 视频偏移量
  optional uint64 new_id = 6;                       // 新消息 ID
  optional string aes_key = 7;                      // AES 密钥
  optional string extend_xml = 8;                   // 扩展 XML
  optional int64 action_flag = 9;                   // 操作标志
}

// UploadVoiceResponse 上传语音响应（镜像 golem.message.UploadVoiceResponse）
message UploadVoiceResponse {
  optional string sender = 1;                         // 发送者用户名
  optional string receiver = 2;                       // 接收者用户名
  optional uint32 offset = 3;                         // 数据偏移量
  optional int32 size = 4;                            // 数据长度
  optional uint32 create_time = 5;                    // 创建时间
  optional string client_id = 6;                      // 客户端消息 ID
  optional uint32 id = 7;                             // 消息 ID
  optional uint32 duration = 8;                       // 语音时长
  optional uint32 end_flag = 9;                       // 结束标志
  optional .api.base.BaseResponse base_response = 10;  // 基础响应
  optional uint32 cancel_flag = 11;                   // 取消标志
  optional uint64 new_id = 12;                        // 新消息 ID
}

// UploadEmojiResponse 上传表情响应（镜像 golem.message.UploadEmojiResponse）
message UploadEmojiResponse {
  optional .api.base.BaseResponse base_response = 1; // 基础响应
  optional int32 count = 2;                         // emoji 项目数量
  repeated Result result = 3;                       // emoji 上传响应列表
  optional uint32 action_flag = 4;                  // 操作标志

  message Result {
    optional int32 code = 1;    // 返回码
    optional int32 offset = 2;  // 起始位置
    optional int32 size = 3;    // 总长度
    optional string md5 = 4;    // MD5 值
    optional uint32 id = 5;     // 消息 ID
    optional uint64 new_id = 6; // 新消息 ID
  }
}

// ==================== 发送应用消息 ====================

// SendAppMessageResponse 发送应用消息响应（镜像 golem.message.SendAppMessageResponse）
message SendAppMessageResponse {
  optional .api.base.BaseResponse base_response = 1; // 基础响应
  optional string app_id = 2;                       // App ID
  optional string sender = 3;                       // 发送者用户名
  optional string receiver = 4;                     // 接收者用户名
  optional uint32 id = 5;                           // 消息 ID
  optional string client_id = 6;                    // 客户端消息 ID
  optional int32 create_time = 7;                   // 创建时间
  optional int32 type = 8;                          // 消息类型
  optional uint64 new_id = 9;                       // 新消息 ID
  optional string aes_key = 10;                     // AES 密钥
  optional string extend_xml = 11;                  // 扩展 XML
  optional int32 action_flag = 12;                  // 操作标志
}

// ==================== 撤回消息 ====================

// RevokeMessageResponse 撤回消息响应（镜像 golem.message.RevokeMessageResponse）
message RevokeMessageResponse {
  optional .api.base.BaseResponse base_response = 1; // 基础响应
  optional string introduction = 2;                 // 介绍
  optional string sys_wording = 3;                  // 系统提示语
}

// ==================== 下载消息资源 ====================

// DownloadImageResponse 下载图片响应（镜像 golem.message.DownloadImageResponse）
message DownloadImageResponse {
  optional .api.base.BaseResponse base_response = 1; // 基础响应
  optional uint32 id = 2;                            // 消息 ID
  optional google.protobuf.StringValue sender = 3;   // 发送者用户名
  optional google.protobuf.StringValue receiver = 4; // 接收者用户名
  optional uint32 size = 5;                          // 文件总长度
  optional uint32 offset = 6;                        // 起始位置
  optional uint32 chunk_size = 7;                    // 本次请求长度
  optional .api.base.Buffer chunk = 8;                // 图片数据
  optional uint64 new_id = 9;                        // 新消息 ID
}

// DownloadVideoResponse 下载视频响应（镜像 golem.message.DownloadVideoResponse）
message DownloadVideoResponse {
  optional .api.base.BaseResponse base_response = 1; // 基础响应
  optional uint32 id = 2;                            // 消息 ID
  optional uint32 size = 3;                          // 文件总长度
  optional uint32 offset = 4;                        // 起始位置
  optional .api.base.Buffer chunk = 5;                // 视频数据
  optional uint64 new_id = 6;                        // 新消息 ID
}

// DownloadVoiceResponse 下载语音响应（镜像 golem.message.DownloadVoiceResponse）
message DownloadVoiceResponse {
  optional uint32 id = 1;                            // 消息 ID
  optional uint32 offset = 2;                        // 偏移量
  optional uint32 size = 3;                          // 长度
  optional uint32 duration = 5;                      // 语音长度
  optional string client_id = 6;                     // 客户端消息 ID
  optional .api.base.Buffer data = 7;                 // 数据
  optional uint32 end_flag = 8;                      // 结束标志
  optional .api.base.BaseResponse base_response = 9;  // 基础响应
  optional uint32 cancel_flag = 10;                  // 取消标志
  optional uint64 new_id = 11;                       // 新消息 ID
}

// DownloadFileResponse 下载文件响应（镜像 golem.message.DownloadAppAttachResponse）
message DownloadFileResponse {
  optional .api.base.BaseResponse base_response = 1; // 基础响应
  optional string app_id = 2;                       // App ID
  optional string media_id = 3;                     // 附件 ID
  optional string username = 4;                     // 用户名
  optional uint32 size = 5;                         // 文件总长度
  optional uint32 offset = 6;                       // 起始位置
  optional uint32 chunk_size = 7;                   // 数据长度
  optional .api.base.Buffer chunk = 8;               // 文件数据
}
