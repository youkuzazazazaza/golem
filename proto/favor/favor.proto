syntax = "proto3";

package favor;

option go_package = "github.com/sbgayhub/golem/sdk/favor";


// ==================== 通用消息 ====================

// FavorItem 收藏项信息（供插件使用）
message FavorItem {
  uint32 id = 1;           // 收藏 ID
  int32 status = 2;        // 状态
  string object = 3;       // 收藏对象（JSON 格式）
  uint32 flag = 4;         // 标志
  uint32 update_time = 5;  // 更新时间（Unix 时间戳）
  uint32 update_seq = 6;   // 更新序列号
}

// FavorInfo 收藏容量信息
message FavorInfo {
  uint64 used_size = 1;       // 已使用容量（字节）
  uint64 total_size = 2;      // 总容量（字节）
  uint64 max_file_size = 3;   // 单文件大小上限（字节）
  int32 max_auto_upload = 4;  // 自动上传大小上限
  int32 max_auto_download = 5; // 自动下载大小上限
}

// OperateResponse 通用操作响应
message OperateResponse {
  int32 code = 1;     // 状态码（0=成功）
  string message = 2; // 提示信息
}

// ==================== 获取收藏信息 ====================

// GetInfoRequest 获取收藏信息请求
message GetInfoRequest {}

// GetInfoResponse 获取收藏信息响应
message GetInfoResponse {
  FavorInfo info = 1; // 收藏容量信息
}

// ==================== 收藏项查询 ====================

// GetFavItemRequest 获取收藏项详情请求
message GetFavItemRequest {
  int32 fav_id = 1; // 收藏项 ID
}

// GetFavItemResponse 获取收藏项详情响应
message GetFavItemResponse {
  repeated FavorItem items = 1; // 收藏项列表
}

// BatchGetFavItemsRequest 批量获取收藏项请求
message BatchGetFavItemsRequest {
  repeated int32 fav_ids = 1; // 收藏项 ID 列表
}

// BatchGetFavItemsResponse 批量获取收藏项响应
message BatchGetFavItemsResponse {
  repeated FavorItem items = 1; // 收藏项列表
}

// ==================== 删除收藏项 ====================

// DeleteFavItemRequest 删除收藏项请求
message DeleteFavItemRequest {
  int32 fav_id = 1; // 收藏项 ID
}

// DeleteFavItemResponse 删除收藏项响应
message DeleteFavItemResponse {
  repeated DeleteResult results = 1; // 删除结果列表
}

// BatchDeleteFavItemsRequest 批量删除收藏项请求
message BatchDeleteFavItemsRequest {
  repeated int32 fav_ids = 1; // 收藏项 ID 列表
}

// BatchDeleteFavItemsResponse 批量删除收藏项响应
message BatchDeleteFavItemsResponse {
  repeated DeleteResult results = 1; // 删除结果列表
}

// DeleteResult 删除结果
message DeleteResult {
  int32 code = 1;   // 返回码
  uint32 fav_id = 2; // 收藏 ID
}

// ==================== 同步收藏 ====================

// SyncFavorRequest 同步收藏列表请求
message SyncFavorRequest {
  bytes key = 1; // 同步 Key（为空时从头同步，否则增量同步）
}

// SyncFavorResponse 同步收藏列表响应
message SyncFavorResponse {
  repeated FavorItem items = 1; // 收藏项列表
  bytes key = 2;                // 下次同步 Key
  bool has_more = 3;            // 是否还有更多数据
}

// ==================== 服务定义 ====================

// FavorService 收藏服务
service FavorService {
  // GetInfo 获取收藏容量信息
  rpc GetInfo(GetInfoRequest) returns (GetInfoResponse);
  // GetItem 获取收藏项详情
  rpc GetItem(GetFavItemRequest) returns (GetFavItemResponse);
  // BatchGetItems 批量获取收藏项
  rpc BatchGetItems(BatchGetFavItemsRequest) returns (BatchGetFavItemsResponse);
  // Delete 删除收藏项
  rpc Delete(DeleteFavItemRequest) returns (DeleteFavItemResponse);
  // BatchDelete 批量删除收藏项
  rpc BatchDelete(BatchDeleteFavItemsRequest) returns (BatchDeleteFavItemsResponse);
  // Sync 同步收藏列表
  rpc Sync(SyncFavorRequest) returns (SyncFavorResponse);
}
