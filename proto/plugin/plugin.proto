syntax = "proto3";

package plugin;

import "command/command.proto";
import "message/types.proto";


// metadata 插件元数据
message Metadata {
  string name = 1; // 名称
  string author = 2; // 作者
  string version = 3; // 版本
  string description = 4; // 描述
  int32 priority = 5; // 插件优先级

  bool next = 6; // 插件执行成功后，是否继续执行后续插件
  bool always_run = 7; // 一直运行，忽略会话劫持
}


// Event 事件
message Event {
  string topic = 1; // 事件主题
  string sender = 2; // 事件发送者username
  oneof payload {
    string error = 3; // 错误消息
    string system = 4; // 系统消息
    message.Message message = 5; // 消息
    SessionExpired session_expired = 6; // 会话到期
  }
}

// SessionExpired 会话到期事件
message SessionExpired {
  string plugin_id = 1; // 劫持会话的插件ID
  string session_id = 2; // 关联的发送者(username)
  string reason = 3; // 到期原因: timeout
}

// CallEvent 调用事件
message CallEvent {
  string method = 1; // 方法
  string args = 2; // 参数
}


// HostService 宿主提供的插件相关服务
service HostService {
  // 会话劫持接口
  rpc SessionHold(SessionHold.Request) returns (SessionHold.Response); // 劫持会话
  rpc SessionRelease(SessionRelease.Request) returns (SessionRelease.Response); // 释放会话

  // 调用其他插件
  rpc CallPlugin(CallPlugin.Request) returns (CallPlugin.Response);

  // 配置管理
  rpc SaveConfig(SaveConfig.Request) returns (SaveConfig.Response); // 保存插件配置
}

// PluginService 插件服务
service PluginService {
  // 插件核心接口
  rpc GetMetadata(GetMetadata.Request) returns (GetMetadata.Response); // 获取插件元数据
  rpc OnCall(OnCall.Request) returns (OnCall.Response); // 处理调用请求
  rpc OnEvent(OnEvent.Request) returns (OnEvent.Response); // 处理事件请求
  rpc OnCommand(OnCommand.Request) returns (OnCommand.Response); // 处理命令请求
  rpc GetCapabilities(GetCapabilities.Request) returns (GetCapabilities.Response); // 获取插件能力
  rpc GetSubscriptions(GetSubscriptions.Request) returns (GetSubscriptions.Response); // 获取订阅事件列表
  rpc GetCommands(GetCommands.Request) returns (GetCommands.Response); // 获取命令列表

  // 插件生命周期接口
  rpc OnLoad(OnLifecycle.Request) returns (OnLifecycle.Response); // 插件加载时调用
  rpc OnUnload(OnLifecycle.Request) returns (OnLifecycle.Response); // 插件卸载时调用
  rpc OnEnabled(OnLifecycle.Request) returns (OnLifecycle.Response); // 插件启用时调用
  rpc OnDisabled(OnLifecycle.Request) returns (OnLifecycle.Response); // 插件禁用时调用

  // 能力注入接口
  rpc GetAbilities(GetAbilities.Request) returns (GetAbilities.Response); // 获取插件需要哪些能力
  rpc InjectAbilities(InjectAbility.Request) returns (InjectAbility.Response); // 注入能力

  // 配置管理接口
  rpc GetDefaultConfig(GetDefaultConfig.Request) returns(GetDefaultConfig.Response); // 获取插件默认配置
  rpc SetConfig(SetConfig.Request) returns (SetConfig.Response); // 注入插件配置
}

message GetMetadata{
  message Request{ }
  message Response {
    Metadata value = 1;
  }
}

message OnCall{
  message Request {
    CallEvent value = 1;
  }
  message Response {
    string result = 1; // 结果
    string message = 2; // 错误信息
  }
}

message OnEvent{
  message Request {
    Event value = 1;
  }
  message Response {
    bool result = 1; // 结果
    string message = 2; // 错误信息
  }
}

message OnCommand{
  message Request {
    command.Command value = 1;
  }
  message Response {
    string value = 1; // 错误信息
  }
}

message GetCapabilities{
  message Request { }
  message Response {
    repeated string values = 1;
  }
}

message GetSubscriptions{
  message Request { }
  message Response {
    repeated string values = 1;
  }
}

message GetCommands{
  message Request { }
  message Response {
    repeated string values = 1;
  }
}

message OnLifecycle{
  message Request { }
  message Response {
    string value = 1; // 错误信息
  }
}

message SessionHold{
  message Request {
    string plugin_id = 1; // 插件ID
    string sender = 2; // 会话关联的发送者(username)
    uint32 duration = 3; // 保持时长(秒)
  }
  message Response {
    string value = 1; // 错误信息
  }
}

message SessionRelease{
  message Request {
    string plugin_id = 1; // 插件ID
    string sender = 2; // 会话关联的发送者(username)
  }
  message Response {
    string value = 1; // 错误信息
  }
}

message CallPlugin{
  message Request {
    string capability = 1; // 调用方法
    bytes args = 2; // 参数(JSON编码的map[string]string)
  }
  message Response {
    string value = 1; // 返回结果
  }
}

message GetAbilities {
  message Request{}
  message Response {
    repeated string values = 1; // 插件的需要能力列表
  }
}

message InjectAbility{
  message Request {
    uint32 cdn = 1;
    uint32 contact = 2; // 联系人管理服务地址
    uint32 message = 3; // 消息发送服务地址
    uint32 chatroom = 4; // 群组管理服务地址
    uint32 session = 5; // 会话管理服务地址
    uint32 caller = 6; // 插件调用服务地址
    uint32 config = 7; // 配置管理服务地址
  }
  message Response {
    string value = 1; // 错误信息
  }
}


message GetDefaultConfig {
  message Request {}
  message Response {
    optional bytes data = 1; // 插件配置数据二进制
  }
}

message SetConfig {
  message Request {
    optional bytes data = 1; // 插件配置数据二进制
  }
  message Response {
    bool result = 1; // 配置注入结果
  }
}

message SaveConfig {
  message Request {
    string plugin_id = 1; // 插件ID
    bytes data = 2;       // 插件配置数据(JSON)
  }
  message Response {
    string message = 1; // 错误信息
  }
}