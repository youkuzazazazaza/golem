syntax = "proto3";

package label;

option go_package = "github.com/sbgayhub/golem/sdk/label";


// ==================== 通用消息 ====================

// LabelPair 标签信息
message LabelPair {
  uint32 id = 1;   // 标签 ID
  string name = 2; // 标签名称
}

// OperateResponse 通用操作响应
message OperateResponse {
  int32 code = 1;     // 状态码（0=成功）
  string message = 2; // 提示信息
}

// ==================== 获取标签列表 ====================

// ListLabelsRequest 获取标签列表请求
message ListLabelsRequest {}

// ListLabelsResponse 获取标签列表响应
message ListLabelsResponse {
  repeated LabelPair labels = 1; // 标签列表
}

// ==================== 添加标签 ====================

// AddLabelRequest 添加标签请求
message AddLabelRequest {
  string name = 1; // 标签名称
}

// AddLabelResponse 添加标签响应
message AddLabelResponse {
  LabelPair label = 1; // 新创建的标签
}

// ==================== 删除标签 ====================

// DeleteLabelRequest 删除标签请求
message DeleteLabelRequest {
  string label_ids = 1; // 标签 ID 列表（逗号分隔，如 "1,2,3"）
}

// ==================== 更新标签 ====================

// UpdateLabelRequest 更新标签请求
message UpdateLabelRequest {
  uint32 label_id = 1; // 标签 ID
  string name = 2;     // 新标签名称
}

// ==================== 修改联系人标签 ====================

// ModifyContactLabelsRequest 修改联系人标签请求
message ModifyContactLabelsRequest {
  repeated string usernames = 1; // 联系人用户名列表
  string label_ids = 2;          // 标签 ID 列表（逗号分隔）
}

// ==================== 服务定义 ====================

// LabelService 标签服务
service LabelService {
  // List 获取标签列表
  rpc List(ListLabelsRequest) returns (ListLabelsResponse);
  // Add 添加标签
  rpc Add(AddLabelRequest) returns (AddLabelResponse);
  // Delete 删除标签
  rpc Delete(DeleteLabelRequest) returns (OperateResponse);
  // Update 更新标签名称
  rpc Update(UpdateLabelRequest) returns (OperateResponse);
  // ModifyContactLabels 修改联系人标签
  rpc ModifyContactLabels(ModifyContactLabelsRequest) returns (OperateResponse);
}
