version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/sbgayhub/golem/sdk
plugins:
  - local: protoc-gen-go
    out: ../sdk
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: ../sdk
    opt:
      - paths=source_relative
