syntax = "proto3";

package group;

option go_package = "github.com/sbgayhub/golem/sdk/group";


// ==================== 群缓存数据结构 ====================

// GroupInfo 群信息（供插件使用及缓存）
message Group {
  string group_id = 1;       // 群 ID
  string name = 2;           // 群名称
  string announcement = 3;   // 群公告
  string remark = 4;         // 群备注
  string owner = 5;          // 群主用户名
  repeated string admins = 6; // 管理员列表
  uint32 member_count = 7;   // 成员数量
  string big_avatar_url = 8; // 大头像 URL
  string small_avatar_url = 9; // 小头像 URL
}

// GroupMemberInfo 群成员信息（供缓存使用）
message GroupMember {
  string username = 1;       // 用户名
  string nickname = 2;       // 昵称
  string display_name = 3;   // 群内显示名
  string big_avatar_url = 4; // 大头像 URL
  string small_avatar_url = 5; // 小头像 URL
  uint32 flag = 6;           // 成员标志
  string inviter_username = 7; // 邀请人用户名
}

// ==================== 通用消息 ====================

// OperateResponse 通用操作响应
message OperateResponse {
  int32 code = 1;     // 状态码（0=成功）
  string message = 2; // 提示信息
}

// ==================== 群聊创建 ====================

// CreateGroupRequest 创建群聊请求
message CreateGroupRequest {
  repeated string members = 1; // 初始成员用户名列表
}

// CreateGroupResponse 创建群聊响应
message CreateGroupResponse {
  string group_id = 1;          // 群 ID
  string name = 2;              // 群名称
  repeated GroupMember members = 3; // 成员列表
  string big_avatar_url = 4;    // 大头像 URL
  string small_avatar_url = 5;  // 小头像 URL
}

// FacingCreateGroupRequest 面对面建群请求
message FacingCreateGroupRequest {
  string password = 1;       // 面对面密码
  float latitude = 2;        // 纬度
  float longitude = 3;       // 经度
  uint32 operate = 4;        // 操作类型
}

// FacingMember 面对面建群成员
message FacingMember {
  string username = 1;     // 用户名
  string nickname = 2;     // 昵称
  string display_name = 3; // 显示名
  string avatar_url = 4;   // 头像 URL
  uint32 flag = 5;         // 标志
}

// FacingCreateGroupResponse 面对面建群响应
message FacingCreateGroupResponse {
  string group_id = 1;               // 群 ID
  string ticket = 2;                 // 票据
  uint32 member_count = 3;           // 成员数量
  repeated FacingMember members = 4; // 成员列表
}

// ==================== 群信息获取 ====================

// GetGroupInfoRequest 获取群信息请求
message GetGroupInfoRequest {
  string group_id = 1; // 群 ID
}

// GetGroupInfoResponse 获取群信息响应
message GetGroupInfoResponse {
  Group info = 1; // 群信息
}

// GetGroupMemberDetailRequest 获取群成员详情请求
message GetGroupMemberDetailRequest {
  string group_id = 1; // 群 ID
}

// GetGroupMemberDetailResponse 获取群成员详情响应
message GetGroupMemberDetailResponse {
  string group_id = 1;                    // 群 ID
  int32 server_version = 2;               // 服务端版本号
  repeated GroupMember members = 3;   // 成员列表
}

// GetGroupQRCodeRequest 获取群二维码请求
message GetGroupQRCodeRequest {
  string group_id = 1; // 群 ID
}

// GetGroupQRCodeResponse 获取群二维码响应
message GetGroupQRCodeResponse {
  bytes qrcode = 1;        // 二维码图片数据
  string qrcode_url = 2;   // 二维码 URL
  string footer_wording = 3; // 底部文字
}

// ==================== 群成员管理 ====================

// AddGroupMemberRequest 添加群成员请求
message AddGroupMemberRequest {
  string group_id = 1;       // 群 ID
  repeated string members = 2; // 成员用户名列表
}

// AddGroupMemberResponse 添加群成员响应
message AddGroupMemberResponse {
  uint32 member_count = 1;                // 成员数量
  repeated GroupMember members = 2;   // 新增成员列表
}

// InviteGroupMemberRequest 邀请群成员请求
message InviteGroupMemberRequest {
  string group_id = 1;       // 群 ID
  repeated string members = 2; // 成员用户名列表
}

// InviteGroupMemberResponse 邀请群成员响应
message InviteGroupMemberResponse {
  uint32 member_count = 1;                // 成员数量
  repeated GroupMember members = 2;   // 新增成员列表
}

// RemoveGroupMemberRequest 移除群成员请求
message RemoveGroupMemberRequest {
  string group_id = 1;       // 群 ID
  repeated string members = 2; // 要移除的成员用户名列表
}

// RemoveGroupMemberResponse 移除群成员响应
message RemoveGroupMemberResponse {
  uint32 member_count = 1;                // 剩余成员数量
  repeated GroupMember members = 2;   // 移除的成员列表
}

// ==================== 群设置 ====================

// SetGroupNameRequest 设置群名称请求
message SetGroupNameRequest {
  string group_id = 1; // 群 ID
  string name = 2;     // 新群名称
}

// SetAnnouncementRequest 设置群公告请求
message SetAnnouncementRequest {
  string group_id = 1; // 群 ID
  string content = 2;  // 公告内容
}

// SetAnnouncementResponse 设置群公告响应
message SetAnnouncementResponse {
  int32 code = 1;     // 状态码
  string message = 2; // 提示信息
}

// SetGroupRemarkRequest 设置群备注请求
message SetGroupRemarkRequest {
  string group_id = 1; // 群 ID
  string remark = 2;   // 群备注
}

// SetContactListRequest 保存到通讯录请求
message SetContactListRequest {
  string group_id = 1; // 群 ID
  bool save = 2;       // true=保存，false=取消保存
}

// ==================== 群管理员 ====================

// SetGroupAdminRequest 设置群管理员请求
message SetGroupAdminRequest {
  string group_id = 1;       // 群 ID
  repeated string members = 2; // 管理员用户名列表
}

// RemoveGroupAdminRequest 移除群管理员请求
message RemoveGroupAdminRequest {
  string group_id = 1;       // 群 ID
  repeated string members = 2; // 要移除的管理员用户名列表
}

// TransferGroupOwnerRequest 转让群主请求
message TransferGroupOwnerRequest {
  string group_id = 1;   // 群 ID
  string new_owner = 2;  // 新群主用户名
}

// ==================== 进群与退群 ====================

// ScanJoinRequest 扫码进群请求
message ScanJoinRequest {
  string qrcode_url = 1; // 二维码 URL
}

// JoinResult 进群结果
message JoinResult {
  string group_id = 1; // 群 ID
  string message = 2;  // 消息
}

// ConsentJoinRequest 同意入群请求
message ConsentJoinRequest {
  string invite_url = 1; // 邀请链接
}

// QuitGroupRequest 退出群聊请求
message QuitGroupRequest {
  string group_id = 1; // 群 ID
}

// ==================== 缓存查询 ====================

// GetGroupByKeyRequest 按键查询缓存群信息请求
message GetGroupByKeyRequest {
  string key = 1; // 查询键（支持前缀：group_id::（默认）、name::）
}

// GetGroupByStrategyRequest 按策略查询缓存群信息请求
message GetGroupByStrategyRequest {
  string key = 1;      // 查询键
  RetrievalType strategy = 2; // 检索策略
}

// GetGroupResponse 查询缓存群信息响应
message GetGroupResponse {
  bool found = 1;         // 是否找到
  Group group = 2;    // 群信息（found=true 时有效）
}

// GetGroupMembersByKeyRequest 按键查询缓存群成员请求
message GetGroupMembersByKeyRequest {
  string group_id = 1; // 群 ID
}

// GetGroupMembersResponse 查询缓存群成员响应
message GetGroupMembersResponse {
  bool found = 1;                          // 是否找到
  repeated GroupMember members = 2;    // 成员列表（found=true 时有效）
}

// RetrievalType 缓存检索策略
enum RetrievalType {
  RETRIEVAL_TYPE_UNSPECIFIED = 0; // 未指定
  RETRIEVAL_TYPE_GROUP_ID = 1;    // 按群 ID 检索
  RETRIEVAL_TYPE_NAME = 2;        // 按群名称检索
}

// ==================== 服务定义 ====================

// GroupService 群聊服务
service GroupService {
  // Create 创建群聊
  rpc Create(CreateGroupRequest) returns (CreateGroupResponse);
  // FacingCreate 面对面建群
  rpc FacingCreate(FacingCreateGroupRequest) returns (FacingCreateGroupResponse);
  // GetInfo 获取群信息
  rpc GetInfo(GetGroupInfoRequest) returns (GetGroupInfoResponse);
  // GetMemberDetail 获取群成员详情
  rpc GetMemberDetail(GetGroupMemberDetailRequest) returns (GetGroupMemberDetailResponse);
  // GetQRCode 获取群二维码
  rpc GetQRCode(GetGroupQRCodeRequest) returns (GetGroupQRCodeResponse);
  // AddMember 添加群成员
  rpc AddMember(AddGroupMemberRequest) returns (AddGroupMemberResponse);
  // InviteMember 邀请群成员
  rpc InviteMember(InviteGroupMemberRequest) returns (InviteGroupMemberResponse);
  // RemoveMember 移除群成员
  rpc RemoveMember(RemoveGroupMemberRequest) returns (RemoveGroupMemberResponse);
  // SetName 设置群名称
  rpc SetName(SetGroupNameRequest) returns (OperateResponse);
  // SetAnnouncement 设置群公告
  rpc SetAnnouncement(SetAnnouncementRequest) returns (SetAnnouncementResponse);
  // SetRemark 设置群备注
  rpc SetRemark(SetGroupRemarkRequest) returns (OperateResponse);
  // SetContactList 保存到通讯录
  rpc SetContactList(SetContactListRequest) returns (OperateResponse);
  // SetAdmin 设置群管理员
  rpc SetAdmin(SetGroupAdminRequest) returns (OperateResponse);
  // RemoveAdmin 移除群管理员
  rpc RemoveAdmin(RemoveGroupAdminRequest) returns (OperateResponse);
  // TransferOwner 转让群主
  rpc TransferOwner(TransferGroupOwnerRequest) returns (OperateResponse);
  // Quit 退出群聊
  rpc Quit(QuitGroupRequest) returns (OperateResponse);
  // ScanJoin 扫码进群
  rpc ScanJoin(ScanJoinRequest) returns (JoinResult);
  // ScanJoinEnterprise 企业微信扫码进群
  rpc ScanJoinEnterprise(ScanJoinRequest) returns (JoinResult);
  // ConsentJoin 同意入群邀请
  rpc ConsentJoin(ConsentJoinRequest) returns (JoinResult);
  // GetGroupByKey 按键查询缓存群信息
  rpc GetGroupByKey(GetGroupByKeyRequest) returns (GetGroupResponse);
  // GetGroupByStrategy 按策略查询缓存群信息
  rpc GetGroupByStrategy(GetGroupByStrategyRequest) returns (GetGroupResponse);
  // GetGroupMembers 获取缓存群成员列表
  rpc GetGroupMembers(GetGroupMembersByKeyRequest) returns (GetGroupMembersResponse);
}
