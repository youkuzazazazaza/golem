syntax = "proto3";

package contact;

// ==================== 枚举 ====================

// ContactType 联系人类型
enum ContactType {
  CONTACT_TYPE_UNSPECIFIED = 0;
  CONTACT_TYPE_SELF = 1;
  CONTACT_TYPE_FRIEND = 2;
  CONTACT_TYPE_CHATROOM = 3;
  CONTACT_TYPE_OFFICIAL = 4;
  CONTACT_TYPE_SPECIAL = 5;
}


// ==================== 联系人 ====================

// Contact 联系人（统一结构，oneof 区分类型特有数据）
message Contact {
  string username = 1; // wxid
  string nickname = 2; // 昵称
  string remark = 3; // 备注
  string alias = 4; // 微信号
  string avatar = 5; // 头像 URL
  ContactType type = 6; // 联系人类型
  oneof data {
    Friend friend = 20; // 好友数据
    Chatroom chatroom = 21; // 群组数据
    Official official = 22; // 公众号数据
  }
}

// FriendData 好友特有数据
message Friend {
  string country = 1; // 国家
  string province = 2; // 省份
  string city = 3; // 城市
  string gender = 4; // 性别
  string signature = 5; // 个性签名
}

// ChatroomData 群组特有数据
message Chatroom {
  string owner = 1; // 群主 wxid
  uint32 member_count = 2; // 群成员数量
}

// Official 公众号特有数据
message Official {}

// SelfInfo 当前登录账号信息
message SelfInfo {
  string username = 1; // wxid
  string nickname = 2; // 昵称
  string alias = 3; // 微信号
  string avatar = 4; // 头像 URL
  uint32 uin = 5; // UIN
  string email = 6; // 邮箱
  string mobile = 7; // 手机号
}


// ==================== 服务定义 ====================

// ContactService 联系人服务
service ContactService {
  //  Get 按键查询缓存联系人, 支持前缀：username::（默认）、nickname::、remark::
  rpc Get(Get.Request) returns (Get.Response);
  // List 获取联系人列表
  rpc List(List.Request) returns (List.Response);
  // GetSelf 获取当前登录账号信息
  rpc GetSelf(GetSelf.Request) returns (GetSelf.Response);
  rpc SetRemark(SetRemark.Request) returns (SetRemark.Response);
  rpc AddFriend(AddFriend.Request) returns (AddFriend.Response);
  rpc VerifyFriend(VerifyFriend.Request) returns (VerifyFriend.Response);
  rpc Delete(Delete.Request) returns (Delete.Response);
  rpc BlacklistAdd(BlacklistAdd.Request) returns (BlacklistAdd.Response);
  rpc BlacklistRemove(BlacklistRemove.Request) returns (BlacklistRemove.Response);
  rpc Search(Search.Request) returns (Search.Response);
  rpc GetOwner(GetOwner.Request) returns (GetOwner.Response);
}

message Get {
  message Request {
    string key = 1; // 支持前缀：username::（默认）、nickname::、remark::
  }
  message Response {
    optional Contact contact = 1; // 联系人
  }
}

message List {
  message Request {
  }
  message Response {
    repeated Contact contacts = 1; // 联系人列表
  }
}

message GetSelf {
  message Request {
  }
  message Response {
    optional SelfInfo self = 1; // 当前登录账号信息
  }
}

message SetRemark {
  message Request {
    string username = 1; // 联系人 wxid
    string remark = 2; // 新备注
  }
  message Response {
    int32 code = 1; // 状态码（0=成功）
    string message = 2; // 提示信息
  }
}

message AddFriend {
  message Request {
    string v1 = 1; // v1 凭证
    string v2 = 2; // v2 凭证
    string content = 3; // 申请附言
    int32 operate = 4; // 操作类型
    int32 scene = 5; // 申请场景
  }
  message Response {
    int32 code = 1; // 状态码（0=成功）
    string message = 2; // 提示信息
  }
}

message VerifyFriend {
  message Request {
    string v1 = 1; // v1 凭证
    string v2 = 2; // v2 凭证
    int32 scene = 3; // 验证场景
  }
  message Response {
    int32 code = 1; // 状态码（0=成功）
    string message = 2; // 提示信息
  }
}

message Delete {
  message Request {
    string username = 1; // 联系人 wxid
  }
  message Response {
    int32 code = 1; // 状态码（0=成功）
    string message = 2; // 提示信息
  }
}

message BlacklistAdd {
  message Request {
    string username = 1; // 联系人 wxid
  }
  message Response {
    int32 code = 1; // 状态码（0=成功）
    string message = 2; // 提示信息
  }
}

message BlacklistRemove {
  message Request {
    string username = 1; // 联系人 wxid
  }
  message Response {
    int32 code = 1; // 状态码（0=成功）
    string message = 2; // 提示信息
  }
}

message Search {
  message Request {
    string keyword = 1; // 搜索关键词
    uint32 from_scene = 2; // 搜索来源场景
    uint32 search_scene = 3; // 搜索场景
  }
  message Response {
    Contact contacts = 1; // 联系人
  }
}

message GetOwner {
  message Request { }
  message Response {
    Contact owner = 1;
  }
}