# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  OS: "windows" # 构建目标系统
  ARCH: "amd64" # 构建目标架构
  DIR: "host/plugins" # 为空时输出到插件目录；非空时输出到仓库根目录下的指定目录。
  PLUGINS:
    [
      ai,
      cron,
      gg,
      news,
      reread,
      statistics,
      universal,
      meme,
      video_parser,
      music,
      fake_forward,
      profile,
    ]

tasks:
  build:*:
    desc: 构建指定插件，例如 task build:ai
    vars:
      PLUGIN: "{{index .MATCH 0}}"
    cmds:
      - task: _build
        vars:
          PLUGIN: "{{.PLUGIN}}"

  buildall:
    desc: 构建所有插件
    cmds:
      - for:
          var: PLUGINS
          as: PLUGIN
        task: _build
        vars:
          PLUGIN: "{{.PLUGIN}}"

  _build:
    internal: true
    requires:
      vars:
        - name: PLUGIN
          enum:
            ref: .PLUGINS
    vars:
      CUSTOM_DIR: '{{.DIR | default ""}}'
      PROJECT_DIR: '{{joinPath .TASKFILE_DIR ".."}}'
      OUT_DIR: "{{if .CUSTOM_DIR}}{{joinPath .PROJECT_DIR .CUSTOM_DIR}}{{else}}{{joinPath .TASKFILE_DIR .PLUGIN}}{{end}}"
      OUT_FILE: '{{joinPath .OUT_DIR (printf "golem_plugin_%s%s" .PLUGIN exeExt)}}'
      PLUGIN_DIR: "{{joinPath .TASKFILE_DIR .PLUGIN}}"
    cmds:
      - cmd: echo "正在拉取插件 {{.PLUGIN}} 的依赖..."
        silent: true
      - cmd: go mod download -C "{{.PLUGIN_DIR}}"
        silent: true
      - cmd: echo "正在构建插件 {{.PLUGIN}}..."
        silent: true
      - cmd: GOOS={{OS}} GOARCH={{ARCH}} go build -C "{{.PLUGIN_DIR}}" -ldflags "-s -w" -o "{{.OUT_FILE}}" .
        silent: true
      - cmd: echo "插件 {{.PLUGIN}} 构建完成：{{.OUT_FILE}}"
        silent: true
